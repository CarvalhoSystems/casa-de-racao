<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Shop - Cadastro</title>
    <link rel="stylesheet" href="/css/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!--Favicon-->
    <link
      rel="icon"
      type="image/png"
      href="../img/favicon-96x96.png"
      sizes="96x96"
    />
    <!--Swal-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" type="image/png" href="/img/favicon.png" />
  </head>
  <body>
    <main class="login-container">
      <!-- O lado esquerdo continua sendo preenchido pelo background no CSS -->
      <section class="login-content">
        <div class="login-box">
          <h2>Crie sua conta</h2>
          <p>Junte-se à nossa comunidade e cuide melhor do seu pet.</p>

          <form id="cadastro-form">
            <div class="input-group">
              <label for="name">Nome Completo</label>
              <input
                type="text"
                id="name"
                placeholder="Como quer ser chamado?"
                required
              />
            </div>

            <div class="input-group">
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                placeholder="exemplo@email.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Senha</label>
              <input
                type="password"
                id="password"
                placeholder="Crie uma senha forte"
                required
              />
            </div>

            <div class="input-group">
              <label for="confirm-password">Confirmar Senha</label>
              <input
                type="password"
                id="confirm-password"
                placeholder="Repita a senha"
                required
              />
            </div>

            <button type="submit" class="btn-login">Cadastrar</button>

            <div class="footer-links">
              <span>Já possui uma conta? <a href="/">Faça login</a></span>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script type="module" src="/JS/cadastro.js"></script>
    <script type="module" src="/JS/firebase-config.js"></script>
  </body>
</html>
