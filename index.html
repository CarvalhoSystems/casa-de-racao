<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Shop - Login</title>
    <link rel="stylesheet" href="/css/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!--Favicon-->
    <link
      rel="icon"
      type="image/png"
      href="img/favicon-96x96.png"
      sizes="96x96"
    />

    <!--Swal-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <main class="login-container">
      <!-- O lado esquerdo é preenchido pelo background no CSS -->
      <section class="login-content">
        <div class="login-box">
          <h2>Bem-vindo de volta!</h2>
          <p>Acesse sua conta para cuidar do seu pet.</p>

          <form id="login-form">
            <div class="input-group">
              <label for="user">E-mail/Usuário</label>
              <input
                type="text"
                id="user"
                placeholder="Digite seu e-mail ou usuário"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Senha</label>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="btn-login">Entrar</button>

            <div class="footer-links">
              <a href="#">Esqueci minha senha</a>
              <span
                >Não tem conta?
                <a href="/pages/new-cadastro.html">Cadastre-se</a></span
              >
            </div>
          </form>
        </div>
      </section>
    </main>
    <script type="module" src="/js/index.js"></script>
    <script type="module" src="/js/firebase-config.js"></script>
  </body>
</html>
